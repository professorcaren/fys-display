<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First-Year Seminars — Fall 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&family=Source+Serif+4:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #13294B;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Open Sans', Arial, sans-serif;
    cursor: none;
  }

  #logo {
    position: fixed;
    top: 2vh;
    left: 2vw;
    z-index: 101;
    pointer-events: none;
  }

  #logo img {
    height: clamp(50px, 7vh, 90px);
  }

  #header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    text-align: center;
    padding: 3vh 2vw 2vh;
    background: linear-gradient(to bottom, #13294B 65%, transparent);
    pointer-events: none;
  }

  #header h1 {
    color: #FFFFFF;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: clamp(28px, 3.5vw, 56px);
    font-weight: 700;
  }

  #header h2 {
    color: #FFFFFF;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: clamp(28px, 3.5vw, 56px);
    font-weight: 700;
    margin-top: 0.1em;
  }

  #canvas {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  .title-item {
    position: absolute;
    white-space: nowrap;
    pointer-events: none;
    will-change: transform;
    transition: color 0.3s, text-shadow 0.3s;
  }

  #counter {
    position: fixed;
    bottom: 2vh;
    right: 3vw;
    z-index: 100;
    color: #4B9CD3;
    font-family: 'Open Sans', Arial, sans-serif;
    font-size: clamp(11px, 1vw, 15px);
    font-weight: 300;
    opacity: 0.4;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<div id="logo">
  <img src="University Signature/Horizontal/Web/PNG/University_Signature_CarolinaBlue_White_rgb_h.png" alt="The University of North Carolina at Chapel Hill">
</div>

<div id="header">
  <h1>First-Year Seminars and Launches</h1>
  <h2>Fall 2026</h2>
</div>

<div id="canvas"></div>

<script>
const TITLES = [
  "Defining Blackness",
  "African Migrations, Boundaries, Displacements, and Belonging",
  "Youth Activism, Citizenship, and Social Change in Africa",
  "African American Art of the Carolinas",
  "African-American Politics and Economic Inequality",
  "America\u2019s Founding Documents",
  "American Democracy in Changing Times",
  "American Politics and Literature",
  "Archaeology and the Age of Heroes",
  "Art, Gender, and Power in Early Modern Europe",
  "Asian Socialist Systems",
  "Beyond Human/Nature: The Cultural Side of Environmental Issues",
  "Birth and Death in the United States",
  "Black Feminism",
  "Blackness and Racialization",
  "Blake 2.0: William Blake in Popular Culture",
  "Bodies and Burials: An Archaeological Perspective",
  "Brain Matters: The Human Computer",
  "Calculus of Functions of One Variable I",
  "Change in the Coastal Ocean",
  "Connections to the Sea",
  "Culture and the Cold War",
  "Debates in Public Policy and Racial Inequality",
  "Design and Making for Engineers",
  "D\u00e9j\u00e0 vu: Medicine and Narration",
  "Fungi and the Network for Life",
  "Families and Children",
  "Feminism and Food Justice",
  "Field Geology of Eastern California",
  "Film and History",
  "Food in U.S. History",
  "Foundations in Music",
  "Foundations of Statistics and Data Science",
  "Freshwaters in the Anthropocene",
  "From Dragons to Pok\u00e9mon",
  "Future Perfect: Science Fictions and Social Form",
  "General Descriptive Chemistry I",
  "General Descriptive Chemistry II",
  "Global Politics of Climate Change",
  "Globalization, Work, and Inequality",
  "Global Asians",
  "Growing Up Girl, Globally",
  "Handcrafting in the Nanoworld",
  "Healers and Patients",
  "Health Inequality in Africa",
  "Hot Planet, Cool Solutions",
  "How Biologists Pose Questions",
  "Human Being and Citizen",
  "Immigrants and Refugees in World Politics",
  "Introduction to Economics",
  "Introduction to Environment and Society",
  "Central Problems, Great Minds, Big Ideas",
  "Calculus-based Mechanics and Relativity",
  "Is There Life after College?",
  "Science and Technology Policy",
  "Jane Austen, Then and Now",
  "Jewish Spain",
  "Justice and Inequality",
  "Language, Migration, Identity",
  "Love in China",
  "Martyrs and Warriors",
  "Media Masala",
  "Medicinal Plants",
  "Monsters, Murders, and Mayhem",
  "Mountain Environments",
  "Mountains Beyond Mountains",
  "Movies and Politics",
  "The Musical Worlds of Tolkien",
  "Music and the Moving Image",
  "Nations, Borders, and Identities",
  "Nature / Culture / Self-Identity",
  "Navigating and Advocating for your Wellness",
  "Nobel Prize Winning Biology",
  "Play Analysis",
  "Policy Entrepreneurship",
  "Political Ecology of Health and Disease",
  "Principles of Biology",
  "Psychology of Clothes",
  "Queer Black Film and Fiction",
  "Rebuilding the American South",
  "Religion and Writing in the Ancient World",
  "Revolution: 1776 and 1789",
  "Seeing History in Everyday Places",
  "Short Stories and Social Problems",
  "Spectacle in the Theatre",
  "Talking about Numbers",
  "High-Performance Computing",
  "The Future of Work",
  "The Heart of the Play",
  "The Interplay of Music and Physics",
  "From Frankenstein to the Smartphone",
  "The Middle East From the Margins",
  "The Migratory Experience",
  "The Origins and Consequences of 9/11",
  "Nature and Its Preservation",
  "The US and the EU: Partners or Rivals?",
  "The Way of Medicine",
  "Tree. Timber. Totem.",
  "U.S. Immigration",
  "Who Was Socrates?",
  "Witchcraft and Magic",
  "Women of the Black Atlantic",
  "World\u2019s Fairs",
  "Young, Loud, and Political",
  "Development and Inequality",
  "Community Research for Public Health",
  "People, Power, Protest"
];


const canvas = document.getElementById('canvas');

const STYLES = [
  { color: '#FFFFFF', weight: 700, family: "'Source Serif 4', Georgia, serif" },
  { color: '#FFFFFF', weight: 600, family: "'Open Sans', Arial, sans-serif" },
  { color: '#FFFFFF', weight: 400, family: "'Open Sans', Arial, sans-serif" },
  { color: '#FFFFFF', weight: 300, family: "'Open Sans', Arial, sans-serif" },
  { color: '#4B9CD3', weight: 700, family: "'Source Serif 4', Georgia, serif" },
  { color: '#4B9CD3', weight: 600, family: "'Open Sans', Arial, sans-serif" },
  { color: '#4B9CD3', weight: 400, family: "'Open Sans', Arial, sans-serif" },
  { color: '#4B9CD3', weight: 300, family: "'Open Sans', Arial, sans-serif" },
];

// Screen bounds
const HEADER_H = Math.max(160, window.innerHeight * 0.18); // keep titles below header
const PADDING = 10;

function W() { return window.innerWidth; }
function H() { return window.innerHeight; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Physics items
const bodies = [];

function randomAngle() {
  return Math.random() * Math.PI * 2;
}

function createBody(title, placeAnywhere) {
  const fontSize = 16 + Math.floor(Math.random() * 26); // 16–41px
  const style = STYLES[Math.floor(Math.random() * STYLES.length)];
  const opacity = 0.45 + Math.random() * 0.45;

  const el = document.createElement('div');
  el.className = 'title-item';
  el.textContent = title;
  el.style.fontSize = fontSize + 'px';
  el.style.fontWeight = style.weight;
  el.style.fontFamily = style.family;
  el.style.color = style.color;
  el.style.opacity = opacity;
  canvas.appendChild(el);

  const w = el.offsetWidth;
  const h = el.offsetHeight;

  // Speed: smaller = faster (more playful)
  const speed = 8 + Math.random() * 18;
  const angle = randomAngle();
  let vx = Math.cos(angle) * speed;
  let vy = Math.sin(angle) * speed;

  // Place randomly
  let x, y;
  if (placeAnywhere) {
    x = PADDING + Math.random() * (W() - w - PADDING * 2);
    y = HEADER_H + Math.random() * (H() - HEADER_H - h - PADDING);
  } else {
    // Enter from a random edge
    const edge = Math.floor(Math.random() * 4);
    if (edge === 0) { x = -w; y = HEADER_H + Math.random() * (H() - HEADER_H - h); vx = Math.abs(vx); }
    else if (edge === 1) { x = W(); y = HEADER_H + Math.random() * (H() - HEADER_H - h); vx = -Math.abs(vx); }
    else if (edge === 2) { x = Math.random() * (W() - w); y = -h; vy = Math.abs(vy); }
    else { x = Math.random() * (W() - w); y = H(); vy = -Math.abs(vy); }
  }

  const body = { el, x, y, w, h, vx, vy, mass: w * h, baseColor: style.color, flashTimer: 0 };
  el.style.transform = `translate(${x}px, ${y}px)`;
  return body;
}

// AABB overlap test
function overlaps(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// Resolve collision between two AABB bodies
function resolveCollision(a, b) {
  // Compute overlap on each axis
  const overlapX = Math.min(a.x + a.w - b.x, b.x + b.w - a.x);
  const overlapY = Math.min(a.y + a.h - b.y, b.y + b.h - a.y);

  if (overlapX < overlapY) {
    // Separate on X axis
    if (a.x + a.w / 2 < b.x + b.w / 2) {
      a.x -= overlapX / 2;
      b.x += overlapX / 2;
    } else {
      a.x += overlapX / 2;
      b.x -= overlapX / 2;
    }
    // Swap x velocities (elastic)
    const tmpVx = a.vx;
    a.vx = b.vx;
    b.vx = tmpVx;
  } else {
    // Separate on Y axis
    if (a.y + a.h / 2 < b.y + b.h / 2) {
      a.y -= overlapY / 2;
      b.y += overlapY / 2;
    } else {
      a.y += overlapY / 2;
      b.y -= overlapY / 2;
    }
    const tmpVy = a.vy;
    a.vy = b.vy;
    b.vy = tmpVy;
  }

  // Flash both on collision
}

// Initial placement — try to avoid overlaps
const shuffled = shuffle(TITLES);
const COUNT = Math.min(shuffled.length, 20); // show ~20 at a time for readability

for (let i = 0; i < COUNT; i++) {
  const body = createBody(shuffled[i], true);
  // Simple retry to reduce initial overlaps
  let retries = 0;
  while (retries < 10) {
    let collision = false;
    for (const other of bodies) {
      if (overlaps(body, other)) { collision = true; break; }
    }
    if (!collision) break;
    body.x = PADDING + Math.random() * (W() - body.w - PADDING * 2);
    body.y = HEADER_H + Math.random() * (H() - HEADER_H - body.h - PADDING);
    retries++;
  }
  bodies.push(body);
}

// Rotation pool for titles not currently on screen
let offscreenTitles = shuffled.slice(COUNT);
let swapTimer = 0;
const SWAP_INTERVAL = 3; // seconds between swaps

// Animation
let lastTime = performance.now();

function animate(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05); // cap dt
  lastTime = now;

  const sw = W();
  const sh = H();

  // Move bodies
  for (const b of bodies) {
    b.x += b.vx * dt;
    b.y += b.vy * dt;

    // Wall bouncing
    if (b.x < PADDING) { b.x = PADDING; b.vx = Math.abs(b.vx); }
    if (b.x + b.w > sw - PADDING) { b.x = sw - PADDING - b.w; b.vx = -Math.abs(b.vx); }
    if (b.y < HEADER_H) { b.y = HEADER_H; b.vy = Math.abs(b.vy); }
    if (b.y + b.h > sh - PADDING) { b.y = sh - PADDING - b.h; b.vy = -Math.abs(b.vy); }

  }

  // Collision detection (O(n^2) is fine for ~30 items)
  for (let i = 0; i < bodies.length; i++) {
    for (let j = i + 1; j < bodies.length; j++) {
      if (overlaps(bodies[i], bodies[j])) {
        resolveCollision(bodies[i], bodies[j]);
      }
    }
  }

  // Update positions
  for (const b of bodies) {
    b.el.style.transform = `translate(${b.x}px, ${b.y}px)`;
  }

  // Periodically swap a title out for a new one (fade out, replace, fade in)
  swapTimer += dt;
  if (swapTimer > SWAP_INTERVAL && offscreenTitles.length > 0) {
    swapTimer = 0;
    const idx = Math.floor(Math.random() * bodies.length);
    const old = bodies[idx];
    const newTitle = offscreenTitles.shift();
    offscreenTitles.push(old.el.textContent); // recycle old title

    // Fade out, swap, fade in
    old.el.style.transition = 'opacity 1s';
    old.el.style.opacity = '0';
    setTimeout(() => {
      old.el.textContent = newTitle;
      // Remeasure
      old.w = old.el.offsetWidth;
      old.h = old.el.offsetHeight;
      old.el.style.opacity = 0.45 + Math.random() * 0.45;
    }, 1000);
  }

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
